<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Est-ce que je peux te taper les fesses ?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #fdf6f0 0%, #f5ebe4 100%);
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: rgba(255, 251, 248, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.8rem 2.5rem;
            border-radius: 44px;
            box-shadow: 
                0 30px 80px rgba(120, 80, 60, 0.12),
                0 0 0 0.5px rgba(255, 255, 255, 0.7) inset,
                0 0 0 0.5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 640px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Effet "verre" style iOS */
        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, transparent 100%);
            border-radius: 44px 44px 0 0;
            pointer-events: none;
        }

        .emoji-big {
            font-size: 6rem;
            display: block;
            margin-bottom: 0.1rem;
            animation: flottement 4s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(200, 130, 140, 0.2));
            position: relative;
            z-index: 1;
        }

        @keyframes flottement {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 700;
            color: #4a3228;
            margin-bottom: 0.2rem;
            letter-spacing: -0.3px;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }

        .sous-titre {
            font-size: 1rem;
            color: #b09588;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        button {
            border: none;
            padding: 1rem 2.8rem;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.3px;
            position: relative;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Bouton OUI - style iOS rose */
        #btnOui {
            background: linear-gradient(135deg, #ff6b8a, #ee5a7a);
            color: #fff;
            box-shadow: 
                0 8px 28px rgba(238, 90, 122, 0.35),
                0 2px 0 rgba(255, 255, 255, 0.3) inset;
            padding: 1rem 3.5rem;
        }

        #btnOui:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 
                0 14px 40px rgba(238, 90, 122, 0.45),
                0 2px 0 rgba(255, 255, 255, 0.3) inset;
        }

        #btnOui:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(238, 90, 122, 0.3);
        }

        #btnOui .emoji-btn {
            font-size: 1.6rem;
            margin-right: 6px;
        }

        /* Bouton NON - style iOS gris */
        #btnNon {
            background: linear-gradient(135deg, #cdd4d9, #bcc5cc);
            color: #fff;
            box-shadow: 
                0 8px 28px rgba(160, 175, 185, 0.3),
                0 2px 0 rgba(255, 255, 255, 0.25) inset;
            position: relative;
            transition: 0.08s linear;
        }

        #btnNon .emoji-btn {
            font-size: 1.6rem;
            margin-right: 6px;
        }

        #btnNon:hover {
            transform: scale(0.95);
        }

        #btnNon:active {
            transform: scale(0.9);
        }

        /* Message de victoire - style iOS */
        .message-cache {
            margin-top: 2rem;
            padding: 1.2rem 1.8rem;
            border-radius: 36px;
            display: none;
            font-size: 1.7rem;
            font-weight: 600;
            color: #4a3228;
            background: linear-gradient(135deg, #fff0ed, #fce4e0);
            border: 0.5px solid rgba(238, 90, 122, 0.15);
            box-shadow: 0 8px 40px rgba(200, 130, 140, 0.12);
            animation: apparition 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        .message-cache.show {
            display: block;
        }

        @keyframes apparition {
            0% { opacity: 0; transform: scale(0.92) translateY(12px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .message-cache .emoji-msg {
            font-size: 2.2rem;
            margin: 0 4px;
        }

        footer {
            margin-top: 2rem;
            color: #cbb8ae;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.8px;
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }

        /* Effet de brillance style iOS sur les boutons */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.25) 0%, transparent 100%);
            border-radius: 50px 50px 0 0;
            pointer-events: none;
        }

        /* Responsive iPhone style */
        @media (max-width: 500px) {
            .container {
                padding: 2rem 1.5rem 1.8rem;
                border-radius: 36px;
                margin: 10px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .emoji-big {
                font-size: 4.5rem;
            }

            button {
                font-size: 1.3rem;
                padding: 0.85rem 2rem;
            }

            #btnOui {
                padding: 0.85rem 2.5rem;
            }

            .btn-group {
                gap: 1.2rem;
            }

            .message-cache {
                font-size: 1.3rem;
                padding: 1rem 1.2rem;
            }
        }

        @media (max-width: 380px) {
            .container {
                padding: 1.5rem 1rem 1.5rem;
                border-radius: 28px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .emoji-big {
                font-size: 3.8rem;
            }

            button {
                font-size: 1.1rem;
                padding: 0.7rem 1.6rem;
            }

            #btnOui {
                padding: 0.7rem 2rem;
            }

            .btn-group {
                gap: 0.8rem;
                flex-direction: column;
                width: 100%;
            }

            .btn-group button {
                width: 100%;
                max-width: 240px;
            }
        }

        /* Désactiver les interactions sur le bouton Non après Oui */
        #btnNon.desactive {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <span class="emoji-big">🍑</span>
    <h1>Est-ce que je peux te taper les fesses ?</h1>
    <div class="sous-titre">— Une question à ne pas prendre à la légère —</div>

    <div class="btn-group">
        <button id="btnOui">
            <span class="emoji-btn">💖</span> Oui
        </button>
        <button id="btnNon">
            <span class="emoji-btn">🙅‍♀️</span> Non
        </button>
    </div>

    <div id="messageFinal" class="message-cache">
        <span class="emoji-msg">🍑</span>
        Alors là, tu as choisi la bonne réponse !
        <span class="emoji-msg">😏🔥</span>
    </div>

    <footer>✧ le bouton "Non" est un peu… fuyant ✧</footer>
</div>

<script>
    (function() {
        const btnOui = document.getElementById('btnOui');
        const btnNon = document.getElementById('btnNon');
        const message = document.getElementById('messageFinal');

        // Fonction pour obtenir les limites de l'écran
        function getLimites() {
            const rect = btnNon.getBoundingClientRect();
            const btnWidth = rect.width;
            const btnHeight = rect.height;
            const marge = 20;
            return {
                minX: marge,
                maxX: window.innerWidth - btnWidth - marge,
                minY: marge,
                maxY: window.innerHeight - btnHeight - marge
            };
        }

        // Fonction pour déplacer le bouton "Non" aléatoirement
        function deplacerBtnNon() {
            const limites = getLimites();

            // Si la fenêtre est trop petite, on le met au centre
            if (limites.maxX < limites.minX || limites.maxY < limites.minY) {
                btnNon.style.position = 'fixed';
                btnNon.style.left = '50%';
                btnNon.style.top = '50%';
                btnNon.style.transform = 'translate(-50%, -50%)';
                btnNon.style.zIndex = '9999';
                return;
            }

            const randomX = Math.floor(Math.random() * (limites.maxX - limites.minX + 1)) + limites.minX;
            const randomY = Math.floor(Math.random() * (limites.maxY - limites.minY + 1)) + limites.minY;

            btnNon.style.position = 'fixed';
            btnNon.style.left = randomX + 'px';
            btnNon.style.top = randomY + 'px';
            btnNon.style.transform = 'none';
            btnNon.style.zIndex = '9999';

            // Effet d'ombre plus marqué quand il fuit
            btnNon.style.boxShadow = '0 12px 40px rgba(160, 175, 185, 0.4), 0 2px 0 rgba(255,255,255,0.2) inset';
        }

        // Fonction pour remettre le bouton "Non" en place
        function remettreBtnNonDansLeFlux() {
            btnNon.style.position = 'relative';
            btnNon.style.left = 'auto';
            btnNon.style.top = 'auto';
            btnNon.style.transform = 'none';
            btnNon.style.zIndex = 'auto';
            btnNon.style.boxShadow = '0 8px 28px rgba(160, 175, 185, 0.3), 0 2px 0 rgba(255,255,255,0.25) inset';
        }

        // ---- ÉVÉNEMENTS ----

        // Le bouton "Non" s'envole au survol
        btnNon.addEventListener('mouseenter', function(e) {
            if (!btnNon.classList.contains('desactive')) {
                deplacerBtnNon();
                btnNon.style.transition = '0.05s linear';
            }
        });

        // Le bouton "Non" s'envole au clic
        btnNon.addEventListener('click', function(e) {
            e.preventDefault();
            if (!btnNon.classList.contains('desactive')) {
                deplacerBtnNon();
                // Vibreur sur mobile (si supporté)
                if (navigator.vibrate) navigator.vibrate(20);
            }
        });

        // Double clic : il s'envole encore plus loin
        btnNon.addEventListener('dblclick', function(e) {
            e.preventDefault();
            if (!btnNon.classList.contains('desactive')) {
                deplacerBtnNon();
                // Effet bonus : on le déplace 2 fois
                setTimeout(deplacerBtnNon, 150);
            }
        });

        // Clic sur "Oui" : victoire !
        btnOui.addEventListener('click', function() {
            // Afficher le message
            message.classList.add('show');

            // Remettre le bouton Non en place
            remettreBtnNonDansLeFlux();

            // Désactiver le bouton Non
            btnNon.classList.add('desactive');

            // Célébration : animation sur le bouton Oui
            btnOui.style.transform = 'scale(1.08)';
            setTimeout(() => {
                btnOui.style.transform = 'scale(1)';
            }, 300);

            // Vibration sur mobile
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);

            // Faire défiler un peu de confettis virtuels (petite animation)
            console.log('🍑💥 FESSÉE ACCEPTÉE !');
        });

        // Redimensionnement de la fenêtre
        window.addEventListener('resize', function() {
            if (btnNon.style.position === 'fixed' && !btnNon.classList.contains('desactive')) {
                const limites = getLimites();
                let newX = parseInt(btnNon.style.left, 10);
                let newY = parseInt(btnNon.style.top, 10);

                if (isNaN(newX)) newX = limites.minX;
                if (isNaN(newY)) newY = limites.minY;

                newX = Math.max(limites.minX, Math.min(limites.maxX, newX));
                newY = Math.max(limites.minY, Math.min(limites.maxY, newY));

                btnNon.style.left = newX + 'px';
                btnNon.style.top = newY + 'px';
            }
        });

        // Touche "N" pour faire fuir le bouton (easter egg)
        document.addEventListener('keydown', function(e) {
            if ((e.key === 'n' || e.key === 'N') && !btnNon.classList.contains('desactive')) {
                deplacerBtnNon();
            }
        });

        // Initialisation
        remettreBtnNonDansLeFlux();

        console.log('🍑 iPhone style - Prêt pour la fessée !');
    })();
</script>

</body>
</html>
